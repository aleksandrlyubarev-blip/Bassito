name: Unzip and setup repo
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unzip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Find and unzip
        run: |
          ZIP=$(find . -maxdepth 1 -name "*.zip" | head -1)
          echo "Found: $ZIP"
          unzip "$ZIP"
          FOLDER=$(unzip -l "$ZIP" | head -5 | tail -1 | awk '{print $4}' | cut -d'/' -f1)
          cp -r "$FOLDER"/* . 2>/dev/null || true
          cp "$FOLDER"/.env.example . 2>/dev/null || true
          cp "$FOLDER"/.gitignore . 2>/dev/null || true
          rm -rf "$FOLDER" "$ZIP"
          rm -rf .github/workflows/unzip.yml
          
      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A
          git commit -m "Unzip: project structure ready"
          git push
